server {
    server_name tikketsolve-systemoneit.uk www.tikketsolve-systemoneit.uk;

    client_max_body_size 0;

    location = /favicon.ico { access_log off; log_not_found off; }
    
    location /static/ {
        alias /var/www/ticketSolve/staticfiles/;
    }

    location /media/ {
        alias /var/www/ticketSolve/media/;
    }

    location / {
        include proxy_params;
        proxy_pass http://unix:/var/www/ticketSolve/gunicorn.sock;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/tikketsolve-systemoneit.uk/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/tikketsolve-systemoneit.uk/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = www.tikketsolve-systemoneit.uk) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    if ($host = tikketsolve-systemoneit.uk) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name tikketsolve-systemoneit.uk www.tikketsolve-systemoneit.uk;
    return 404; # managed by Certbot
}
